<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>kaki记数工具</title>
    <style>
        :root {
            --m-bg: #f5f3f0;
            --m-text: #5a5a5a;
            --m-border: #dcd7cf;
            --m-blue-main: #9cb1c0;
            --m-green-main: #a3b09c;
            --m-yellow-act: #e2d2ae;
            --m-green-rec: #dce0d9;
            --m-danger: #b09c9c;
        }

        /* 允许整页滚动以适配不滚动的顾客列表 */
        body { 
            font-family: -apple-system, sans-serif; 
            margin: 0; padding: 12px; 
            background: var(--m-bg); 
            color: var(--m-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 顶部工具栏 - 经典卡片感 */
        .toolbar { 
            background: #ffffff; padding: 18px; border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(90,90,90,0.05); 
            margin-bottom: 15px;
            flex-shrink: 0;
        }
        .flex-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
        
        .button-group { 
            display: flex; gap: 10px; width: 100%; justify-content: space-between; 
            border-top: 1px solid #f0edeb; padding-top: 12px;
        }
        .button-group button { flex: 1; }

        .main-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 数字表：加长并保持独立滚动 */
        .pool-box { 
            background: white; padding: 18px; border-radius: 15px; 
            box-shadow: 0 4px 12px rgba(90,90,90,0.03);
            display: flex;
            flex-direction: column;
            height: 55vh; /* 设置为占据屏幕一半以上高度 */
            overflow: hidden;
        }

        .scroll-area {
            overflow-y: auto;
            flex-grow: 1;
            margin-top: 10px;
            padding-right: 5px;
            -webkit-overflow-scrolling: touch;
        }

        /* 顾客清单：不要独立滚动，自然延伸 */
        .cust-box { 
            background: white; padding: 18px; border-radius: 15px; 
            box-shadow: 0 4px 12px rgba(90,90,90,0.03);
            margin-bottom: 20px;
        }

        /* 元素样式保持不变 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(48px, 1fr)); gap: 10px; }
        .num-card { 
            height: 48px; border: 1.5px solid var(--m-blue-main); color: var(--m-blue-main); 
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            border-radius: 8px; cursor: pointer; transition: 0.2s; background: rgba(156, 177, 192, 0.05);
        }
        .num-card.selected { background: var(--m-yellow-act); border-color: #d1bf96; color: #7c6d4d; transform: scale(1.05); z-index: 10; }
        .num-card.sold { background: #e9e7e4; border-color: #d8d3cd; color: #b0adb0; text-decoration: line-through; pointer-events: none; opacity: 0.7; }

        .customer-card { 
            background: #ffffff; border: 1.5px solid var(--m-border); border-radius: 12px; 
            padding: 15px; margin-bottom: 12px; transition: 0.3s;
        }
        .customer-card.can-receive { border-color: var(--m-green-main); background: var(--m-green-rec); cursor: pointer; }
        
        .cust-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .cust-info { display: flex; align-items: center; gap: 8px; }
        .cust-name { font-weight: bold; color: var(--m-text); }
        .cust-count { background: var(--m-blue-main); color: white; border-radius: 12px; padding: 1px 8px; font-size: 11px; }
        
        .tag-box { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag { background: var(--m-blue-main); color: white; padding: 4px 10px; border-radius: 6px; font-size: 13px; cursor: pointer; }

        input { padding: 10px; border: 1px solid var(--m-border); border-radius: 8px; font-size: 14px; background: #fffcf9; }
        button { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .btn-blue-outline { background: transparent; border: 1.5px solid var(--m-blue-main); color: var(--m-blue-main); }
        .btn-green { background: var(--m-green-main); color: white; }
        #statusMsg { background: var(--m-yellow-act); padding: 10px; border-radius: 8px; color: #7c6d4d; font-size: 13px; margin-bottom: 12px; text-align: center; font-weight: 500; border: 1px solid #d1bf96; }
        
        h4 { color: #8a8a8a; font-size: 16px; margin: 0; }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="flex-row">
        <span>范围: 1 到</span>
        <input type="number" id="totalNum" value="50" style="width: 60px;" onchange="renderGrid()">
        <input type="text" id="custInput" placeholder="输入顾客名字" style="flex: 1;">
        <button class="btn-green" onclick="addCustomer()">添加顾客</button>
    </div>
    <div class="flex-row">
        <input type="text" id="searchBar" placeholder="🔍输入关键词快速过滤..." style="flex: 1;" oninput="renderCustomers()">
    </div>
    <div class="button-group">
        <button class="btn-blue-outline" onclick="resetSoldStatus()">重置数字表</button>
        <button class="btn-blue-outline" style="color:var(--m-danger); border-color:var(--m-danger);" onclick="initSystem()">清空所有数据</button>
    </div>
</div>

<div id="statusMsg" style="display:none;"></div>

<div class="main-container">
    <div class="section-box pool-box">
        <h4>🔢 数字表 （多选模式)</h4>
        <div class="scroll-area">
            <div id="numberGrid" class="grid"></div>
        </div>
    </div>

    <div class="cust-box">
        <h4 style="margin-bottom:15px;">👥 顾客清单</h4>
        <div id="customerList"></div>
    </div>
</div>

<script>
    let customers = []; 
    let selectedNums = [];

    function initSystem() {
        if(confirm("确定清空所有数据吗？")) { customers = []; selectedNums = []; renderAll(); }
    }

    function resetSoldStatus() {
        if(confirm("确定收回所有数字吗？")) { customers.forEach(c => c.nums = []); selectedNums = []; renderAll(); }
    }

    function addCustomer() {
        const input = document.getElementById('custInput');
        const name = input.value.trim();
        if(!name) return;
        customers.unshift({ name: name, nums: [] });
        input.value = '';
        renderAll();
    }

    function selectNumber(num) {
        const idx = selectedNums.indexOf(num);
        if (idx > -1) selectedNums.splice(idx, 1);
        else selectedNums.push(num);
        renderAll();
    }

    function bindToCustomer(index) {
        if(selectedNums.length === 0) return;
        customers[index].nums.push(...selectedNums);
        customers[index].nums.sort((a,b) => a-b);
        selectedNums = [];
        renderAll();
    }

    function unbindNumber(custIdx, num) {
        customers[custIdx].nums = customers[custIdx].nums.filter(n => n !== num);
        renderAll();
    }

    function deleteCustomer(idx) {
        if(confirm(`删除顾客 ${customers[idx].name}？`)) { customers.splice(idx, 1); renderAll(); }
    }

    function renderAll() {
        renderGrid();
        renderCustomers();
        const msg = document.getElementById('statusMsg');
        if(selectedNums.length > 0) {
            msg.style.display = 'block';
            msg.innerHTML = `🎯 已选中 [ ${selectedNums.join(', ')} ]，请点选下方人名`;
        } else {
            msg.style.display = 'none';
        }
    }

    function renderGrid() {
        const grid = document.getElementById('numberGrid');
        const total = parseInt(document.getElementById('totalNum').value) || 0;
        const soldNums = customers.flatMap(c => c.nums);
        grid.innerHTML = '';
        for(let i=1; i<=total; i++) {
            const div = document.createElement('div');
            const isSold = soldNums.includes(i);
            const isSelected = selectedNums.includes(i);
            div.className = `num-card ${isSold ? 'sold' : ''} ${isSelected ? 'selected' : ''}`;
            div.innerText = i;
            if(!isSold) div.onclick = () => selectNumber(i);
            grid.appendChild(div);
        }
    }

    function renderCustomers() {
        const list = document.getElementById('customerList');
        const searchTxt = document.getElementById('searchBar').value.toLowerCase();
        list.innerHTML = '';
        customers.forEach((c, cIdx) => {
            if(searchTxt && !c.name.toLowerCase().includes(searchTxt)) return;
            const card = document.createElement('div');
            card.className = `customer-card ${selectedNums.length > 0 ? 'can-receive' : ''}`;
            if(selectedNums.length > 0) card.onclick = () => bindToCustomer(cIdx);
            let tagsHtml = c.nums.map(n => `<span class="tag" onclick="event.stopPropagation(); unbindNumber(${cIdx}, ${n})">${n}</span>`).join('');
            card.innerHTML = `
                <div class="cust-header">
                    <div class="cust-info">
                        <span class="cust-name">👤 ${c.name}</span>
                        <span class="cust-count">${c.nums.length}</span>
                    </div>
                    <span style="color:#b09c9c; font-size:11px;" onclick="event.stopPropagation(); deleteCustomer(${cIdx})">删除</span>
                </div>
                <div class="tag-box" style="margin-top:10px;">${tagsHtml || '<small style="color:#d0ccc6">点击绑定...</small>'}</div>
            `;
            list.appendChild(card);
        });
    }
    renderAll();
</script>
</body>
</html>
